services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/node_modules
      - ${HOST_UPLOAD_PATH:-./local-uploads}:/app/uploads
    environment:
      - PORT=5000
      - DATABASE_URL=${DATABASE_URL}
      - UPLOAD_DIR=/app/uploads
    env_file:
      - .env
